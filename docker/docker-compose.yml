services:
  postgresql:
    image: postgres:14.2
    container_name: postgresql
    ports:
      - "5432:5432"
    command: postgres -c lock_timeout=5000
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./postgresql-data:/var/lib/postgresql/data
    networks:
      - backend-net
  app:
    image: ${DOCKERHUB_USERNAME}/blog-nextjs:latest
    container_name: rudynote-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./uploads:/app/public/uploads
    networks:
      - backend-net
networks:
  backend-net:
    driver: bridge