services:
  app:
    build: .
    container_name: rudynote-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://rudy:rudy1234@db:5432/blog
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: rudynote-db
    environment:
      POSTGRES_USER: rudy
      POSTGRES_PASSWORD: rudy1234
      POSTGRES_DB: blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rudy -d blog"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
